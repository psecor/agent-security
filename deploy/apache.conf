# agent-security Apache snippet.
#
# Add these directives inside your existing HTTPS VirtualHost (*:443),
# alongside any other prefix-based apps. They extend the shared VirtualHost
# — do NOT define a new one.
#
# Requires modules: proxy, proxy_http, headers.
#   sudo a2enmod proxy proxy_http headers
#
# The agent-security service serves both the React UI and the JSON API itself,
# so a single proxy block is enough — no Alias / DocumentRoot needed.

# agent-security — Express on 127.0.0.1:3046, mounted at /security
ProxyPreserveHost On
ProxyPass        /security  http://127.0.0.1:3046/security
ProxyPassReverse /security  http://127.0.0.1:3046/security

# Forward the protocol so Express marks cookies "secure" correctly when
# sameSite=lax + secure=true is in effect (cookies live behind /security).
# (Already set at vhost level on secorp.net; harmless to repeat here.)
RequestHeader set X-Forwarded-Proto "https"
